<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
        .done { text-decoration: line-through; color: gray; }
        li { margin: 10px 0; font-size: 18px; }
        input[type=text] { padding: 8px; width: 70%; font-size: 16px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
        a { margin-left: 10px; text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 Todo List</h1>
    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Yeni görev..." required>
        <button type="submit">Ekle</button>
    </form>
    <ul>
        {% for id, task, done in todos %}
        <li>
            <span class="{{ 'done' if done else '' }}">{{ task }}</span>
            <a href="/done/{{ id }}">{{ '↩️' if done else '✅' }}</a>
            <a href="/delete/{{ id }}">🗑️</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
